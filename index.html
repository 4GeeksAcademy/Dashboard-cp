<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <title>Document</title>
</head>
<body class="bg-gray-100">
    <!-- Sidebar -->
    <div class="fixed left-0 top-0 h-full w-64 bg-gray-900 text-white p-6">
        <!-- Logo/Title -->
        <div class="mb-8 flex items-center">
            <div class="w-8 h-8 rounded-md bg-gradient-to-br from-pink-500 via-fuchsia-500 to-violet-500 flex items-center justify-center mr-3 shadow-lg shadow-purple-500/20">
                <div class="flex space-x-1 text-white text-[8px]">
                    <span>★</span>
                    <span>★</span>
                    <span>★</span>
                </div>
            </div>
            <h1 class="text-xl font-bold">Sarah's Studio</h1>
        </div>
        
        <!-- Menu Items -->
        <nav class="mb-8">
            <ul class="space-y-2">
                <li><a href="#" class="flex items-center py-2 px-4 rounded hover:bg-gray-700">
                    <svg class="w-5 h-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"></path>
                    </svg>
                    Dashboard
                </a></li>
                <li><a href="#" class="flex items-center py-2 px-4 rounded hover:bg-gray-700">
                    <svg class="w-5 h-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197m13.5-9a2.5 2.5 0 11-5 0 2.5 2.5 0 015 0z"></path>
                    </svg>
                    Partnerships
                </a></li>
                <li><a href="#" class="flex items-center py-2 px-4 rounded hover:bg-gray-700">
                    <svg class="w-5 h-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"></path>
                    </svg>
                    My Content
                </a></li>
                <li><a href="#" class="flex items-center py-2 px-4 rounded hover:bg-gray-700">
                    <div class="w-5 h-5 mr-2 rounded-full border-2 border-white-500 flex items-center justify-center text-xs font-bold text-white">$</div>
                    Finance
                </a></li>
            </ul>
        </nav>
        
        <!-- Separator -->
        <hr class="border-gray-700 mb-8">
        
        <!-- Avatar and Info -->
        <div class="flex items-center">
            <div class="w-10 h-10 bg-gray-700 rounded-full flex items-center justify-center text-sky-300 font-bold mr-3">
                JS
            </div>
            <div>
                <p class="font-semibold">John Smith</p>
                <p class="text-xs italic text-gray-400">Content Creator</p>
            </div>
        </div>
    </div>
    
    <!-- Main Content -->
    <div class="ml-64 p-6">
        <!-- Dashboard Header -->
        <div class="flex justify-between items-center mb-6">
            <div>
                <h2 class="text-2xl font-bold">My Brand Dashboard</h2>
                <p class="text-gray-600 text-sm">Personal performance tracking and campaign ROI overview</p>
            </div>
            <div class="flex space-x-4">
                <button class="bg-white text-gray-800 px-4 py-2 rounded-lg border border-gray-300 hover:bg-gray-50">Download Report</button>
                <button class="bg-blue-500 text-white px-4 py-2 rounded-lg hover:bg-blue-600">New Campaign</button>
            </div>
        </div>
    </div>
</body>
</html>
